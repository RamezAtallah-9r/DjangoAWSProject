<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Django Project</title>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 p-4">
    </header>

    <main class="flex-grow container mx-auto p-4 flex justify-evenly items-center gap-4">
        <section class="bg-white shadow-2xl shadow-slate-600 p-8 rounded-xl w-2/5 ">
            <form action="{% url 'DjangoApp:login' %}" method="post"
                class="flex w-full flex-col justify-evenly items-start gap-6">
                {% csrf_token %}
                <h1 class="text-3xl font-medium">Login</h1>
                <div>
                    <label for="email">Email</label>
                    <input required required type="email" name="email"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input required type="password" name="password"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div class="w-full flex justify-center p-2">
                    <button type="submit" class="shadow-xl p-2 bg-gray-100 rounded-lg border-2 border-gray-300">
                        Login</button>
                </div>
            </form>
        </section>


        <section class="bg-white shadow-2xl shadow-slate-600 p-8 rounded-xl w-2/5 ">
            <form action="{% url 'DjangoApp:create_user' %}" method="post"
                class="flex w-full flex-col justify-evenly items-start gap-6">
                {% csrf_token %}
                <div>
                    <label for="first_name">First Name</label>
                    <input required type="text" name="first_name" placeholder="Jack"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="last_name">Last Name</label>
                    <input required type="text" name="last_name" placeholder="Smith"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input required type="text" name="email" placeholder="somthin@mail.com"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="date_of_birth">Date of Birth</label>
                    <input required type="date" name="date_of_birth" id=""
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input required type="password" name="password"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="confirm_password">Confirm Password</label>
                    <input required type="password" name="confirm_password"
                        class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div>
                    <label for="avatar">Upload Avatar</label>
                    <input required type="text" name="avatar" class="w-full rounded-lg p-1 border-2 border-cyan-700">
                </div>
                <div class="w-full flex justify-center p-2">
                    <button type="submit" class="shadow-xl p-2 bg-gray-100 rounded-lg border-2 border-gray-300">Create
                        Account</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-200 p-4 text-center text-sm text-gray-600">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>

</html>
